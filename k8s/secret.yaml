apiVersion: v1
kind: Secret
metadata:
  name: observakit-secrets
  labels:
    app: observakit
type: Opaque
stringData:
  # Metadata Database (PostgreSQL recommended)
  METADATA_DB_TYPE: "postgresql"
  METADATA_DB_HOST: "psql-observakit-metadata.default.svc.cluster.local"
  METADATA_DB_PORT: "5432"
  METADATA_DB_NAME: "observakit"
  METADATA_DB_USER: "observakit"
  METADATA_DB_PASSWORD: "CHANGE_ME_PRODUCTION_SECURE_PASSWORD"
  
  # Global Super-Admin API Key (Legacy/Fallback)
  OBSERVAKIT_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  
  # Alert Dispatchers
  SLACK_WEBHOOK_URL: ""
  ALERT_EMAIL_FROM: "observakit@yourcompany.com"
  SENDGRID_API_KEY: ""
