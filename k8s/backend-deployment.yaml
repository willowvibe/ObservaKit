apiVersion: apps/v1
kind: Deployment
metadata:
  name: observakit-backend
  labels:
    app: observakit
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observakit
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: observakit
        component: backend
    spec:
      containers:
        - name: observakit-backend
          image: ghcr.io/willowvibe/observakit:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: observakit-secrets
          volumeMounts:
            - name: config-volume
              mountPath: /app/config/kit.yml
              subPath: kit.yml
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: observakit-config
