# =============================================================================
# ObservaKit — Docker Compose
# One-command spin-up for the entire observability stack
# =============================================================================

services:
  # ---- ObservaKit Backend (FastAPI) ----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: observakit-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - METADATA_DB_HOST=postgres
      - METADATA_DB_PORT=5432
      - METADATA_DB_USER=${METADATA_DB_USER:-observakit}
      - METADATA_DB_PASSWORD=${METADATA_DB_PASSWORD:-changeme}
      - METADATA_DB_NAME=${METADATA_DB_NAME:-observakit}
      - WAREHOUSE_TYPE=${WAREHOUSE_TYPE:-postgres}
      - WAREHOUSE_HOST=${WAREHOUSE_HOST:-host.docker.internal}
      - WAREHOUSE_PORT=${WAREHOUSE_PORT:-5432}
      - WAREHOUSE_USER=${WAREHOUSE_USER:-}
      - WAREHOUSE_PASSWORD=${WAREHOUSE_PASSWORD:-}
      - WAREHOUSE_DB=${WAREHOUSE_DB:-}
      - WAREHOUSE_SCHEMA=${WAREHOUSE_SCHEMA:-public}
      - AIRFLOW_BASE_URL=${AIRFLOW_BASE_URL:-http://localhost:8080}
      - AIRFLOW_USERNAME=${AIRFLOW_USERNAME:-admin}
      - AIRFLOW_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#data-alerts}
      - FRESHNESS_CHECK_INTERVAL=${FRESHNESS_CHECK_INTERVAL:-15}
      - VOLUME_CHECK_INTERVAL=${VOLUME_CHECK_INTERVAL:-60}
      - SCHEMA_CHECK_INTERVAL=${SCHEMA_CHECK_INTERVAL:-360}
      - QUALITY_CHECK_INTERVAL=${QUALITY_CHECK_INTERVAL:-60}
    volumes:
      - ./config:/app/config:ro
      - ./checks:/app/checks:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Metadata Store (PostgreSQL) ----
  postgres:
    image: postgres:16-alpine
    container_name: observakit-postgres
    environment:
      POSTGRES_USER: ${METADATA_DB_USER:-observakit}
      POSTGRES_PASSWORD: ${METADATA_DB_PASSWORD:-changeme}
      POSTGRES_DB: ${METADATA_DB_NAME:-observakit}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_DB_USER:-observakit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: observakit-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:11.0.0
    container_name: observakit-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/pipeline_health.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---- OpenTelemetry Collector ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: observakit-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./otel/collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
