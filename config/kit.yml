# =============================================================================
# ObservaKit — Master Configuration
# =============================================================================

# Active warehouse connection (references config/warehouses/*.yml)
warehouse:
  type: postgres  # postgres | bigquery | snowflake
  config_file: config/warehouses/postgres.yml

# Orchestrator integration
orchestrator:
  type: airflow  # airflow | prefect | none
  # Airflow settings (override with env vars)
  airflow:
    base_url: ${AIRFLOW_BASE_URL:-http://localhost:8080}
    username: ${AIRFLOW_USERNAME:-admin}
    password: ${AIRFLOW_PASSWORD:-admin}
  # Prefect settings
  prefect:
    api_url: ${PREFECT_API_URL:-http://localhost:4200/api}

# ---- Freshness Monitor ----
freshness:
  enabled: true
  schedule_minutes: 15
  tables:
    - table: public.orders
      timestamp_column: updated_at
      warn_after: 1h
      fail_after: 2h
      alert: slack
    # Add more tables below:
    # - table: public.customers
    #   timestamp_column: modified_at
    #   warn_after: 6h
    #   fail_after: 12h
    #   alert: email

# ---- Volume Monitor ----
volume:
  enabled: true
  schedule_minutes: 60
  rolling_window_days: 7
  tables:
    - table: public.orders
      dag_id: load_orders
      anomaly_threshold: 0.3  # ±30% deviation from rolling avg
      alert: slack
    # Add more tables below:
    # - table: public.customers
    #   dag_id: load_customers
    #   anomaly_threshold: 0.5
    #   alert: slack

# ---- Schema Drift ----
schema_drift:
  enabled: true
  schedule_minutes: 360
  tables:
    - public.orders
    - public.customers
  alert: slack

# ---- Quality Checks ----
quality:
  enabled: true
  schedule_minutes: 60
  engine: soda  # soda | great_expectations
  checks_dir: checks/my_project/
  custom_sql:
    - name: "No orphaned order items"
      query: |
        SELECT COUNT(*) as count FROM order_items oi
        LEFT JOIN orders o ON oi.order_id = o.id
        WHERE o.id IS NULL
      assert: "result == 0"
      table: order_items
      alert: slack

# ---- Distribution Drift Monitor ----
# Detects when column VALUE distributions shift — not just nulls or row counts.
# Example: 'status' column suddenly goes from 5% cancelled → 80% cancelled.
distribution:
  enabled: false  # set to true to enable
  schedule_minutes: 360
  tables:
    - table: public.orders
      drift_threshold: 0.10       # fire alert if any value's share shifts by >10%
      null_drift_threshold: 0.05  # fire alert if null % shifts by >5%
      columns:
        - name: status
          type: categorical
        - name: amount
          type: numeric
    # - table: public.users
    #   columns:
    #     - name: country_code
    #       type: categorical
    #     - name: age
    #       type: numeric

# ---- Data Contracts ----
# Validate tables against producer-defined contracts (schema + business rules).
# Contract files live in config/contracts/*.yml
# See config/contracts/example_orders.yml for the full contract format.
contracts:
  enabled: false  # set to true to enable
  schedule_minutes: 60
  contracts_dir: config/contracts/

# ---- Alerting ----
alerts:
  # ---- Noise Suppression ----
  # Automatically extends the dedup window for alerts that fire too frequently,
  # preventing alert fatigue without any manual suppression commands.
  #
  # How the score works (0–100):
  #   score = min(100, count_1h × 20 + count_24h × 2 + count_7d × 0.5)
  #
  # How the adaptive window works:
  #   window = min(max_dedup_window_minutes, min_dedup_window_minutes × 2^(score/25))
  #   score=0  → 60 min  (no throttle)
  #   score=25 → 120 min (2×)
  #   score=50 → 240 min (4×)
  #   score=75 → 480 min (8× = max)
  noise_suppression:
    enabled: true
    # Base dedup window when there is no noise (minutes)
    min_dedup_window_minutes: 60
    # Hard ceiling on the adaptive window (minutes); default = 8 hours
    max_dedup_window_minutes: 480
    # Alert count within 24 h that starts escalating the dedup window
    auto_throttle_threshold: 10

  # Routing rules: match alerts to channels and recipients
  routing:
    - match:
        alert_type: "schema"
        table_pattern: "payments.*"
      channel: slack
      slack_channel: "#finance-data"
    - match:
        alert_type: "freshness"
      channel: slack
      slack_channel: "#data-freshness"
    # Route contract violations and distribution drift to a dedicated channel
    - match:
        alert_type: "contract"
      channel: slack
      slack_channel: "#data-contracts"
    - match:
        alert_type: "distribution"
      channel: slack
      slack_channel: "#data-alerts"
    # Uncomment to also fire a generic webhook for all critical alerts
    # - match:
    #     alert_type: "quality"
    #   channel: webhook
    #   webhook_url: ${WEBHOOK_ALERT_URL}

  slack:
    webhook_url: ${SLACK_WEBHOOK_URL}
    channel: ${SLACK_CHANNEL:-#data-alerts}
    username: ObservaKit
    icon_emoji: ":mag:"
  email:
    smtp_host: ${SMTP_HOST:-smtp.gmail.com}
    smtp_port: ${SMTP_PORT:-587}
    from: ${ALERT_EMAIL_FROM}
    to: ${ALERT_EMAIL_TO}
  # Discord — popular with developer-first teams
  discord:
    webhook_url: ${DISCORD_WEBHOOK_URL:-}
    mention: ${DISCORD_MENTION:-}   # e.g. "@here" or "<@&ROLE_ID>"
  # Generic outgoing webhook (integrates with PagerDuty, Opsgenie, custom systems)
  webhook:
    url: ${WEBHOOK_ALERT_URL:-}
    secret: ${WEBHOOK_SECRET:-}     # HMAC-SHA256 signing secret (optional)

# ---- Lineage ----
lineage:
  - table: public.orders
    downstream:
      - public.order_items
      - reporting.daily_revenue
  - table: public.customers
    downstream:
      - reporting.customer_activity

# ---- Cross-Table Consistency Checks ----
consistency:
  # Verifies every order_item links to a valid order (referential integrity)
  - name: "Orders ↔ Order Items referential integrity"
    check: row_count_match
    table_a: public.order_items
    table_b: public.orders
    join_key: order_id
    tolerance: 0           # zero orphans allowed
    alert: slack

  # Verifies revenue totals match accounting ledger within 1%
  # - name: "Revenue reconciliation"
  #   check: sum_match
  #   table_a: public.orders
  #   column_a: amount
  #   table_b: accounting.ledger
  #   column_b: credit_amount
  #   tolerance_pct: 0.01  # within 1%
  #   alert: slack

# ---- dbt Integration ----
dbt:
  enabled: false               # set to true to enable dbt artifact parsing
  project_dir: /path/to/dbt/project
  profiles_dir: /path/to/.dbt
  auto_parse_on_run: true      # poll for new run_results.json every 5 minutes
  poll_interval_minutes: 5
  expose_model_freshness: true # use dbt source freshness as ObservaKit freshness
