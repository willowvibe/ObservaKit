# =============================================================================
# ObservaKit — Master Configuration
# =============================================================================

# Active warehouse connection (references config/warehouses/*.yml)
warehouse:
  type: postgres  # postgres | bigquery | snowflake
  config_file: config/warehouses/postgres.yml

# Orchestrator integration
orchestrator:
  type: airflow  # airflow | prefect | none
  # Airflow settings (override with env vars)
  airflow:
    base_url: ${AIRFLOW_BASE_URL:-http://localhost:8080}
    username: ${AIRFLOW_USERNAME:-admin}
    password: ${AIRFLOW_PASSWORD:-admin}
  # Prefect settings
  prefect:
    api_url: ${PREFECT_API_URL:-http://localhost:4200/api}

# ---- Freshness Monitor ----
freshness:
  enabled: true
  schedule_minutes: 15
  tables:
    - table: public.orders
      timestamp_column: updated_at
      warn_after: 1h
      fail_after: 2h
      alert: slack
    # Add more tables below:
    # - table: public.customers
    #   timestamp_column: modified_at
    #   warn_after: 6h
    #   fail_after: 12h
    #   alert: email

# ---- Volume Monitor ----
volume:
  enabled: true
  schedule_minutes: 60
  rolling_window_days: 7
  tables:
    - table: public.orders
      dag_id: load_orders
      anomaly_threshold: 0.3  # ±30% deviation from rolling avg
      alert: slack
    # Add more tables below:
    # - table: public.customers
    #   dag_id: load_customers
    #   anomaly_threshold: 0.5
    #   alert: slack

# ---- Schema Drift ----
schema_drift:
  enabled: true
  schedule_minutes: 360
  tables:
    - public.orders
    - public.customers
  alert: slack

# ---- Quality Checks ----
quality:
  enabled: true
  schedule_minutes: 60
  engine: soda  # soda | great_expectations
  checks_dir: checks/my_project/
  custom_sql:
    - name: "No orphaned order items"
      query: |
        SELECT COUNT(*) as count FROM order_items oi
        LEFT JOIN orders o ON oi.order_id = o.id
        WHERE o.id IS NULL
      assert: "result == 0"
      table: order_items
      alert: slack

# ---- Alerting ----
alerts:
  # Routing rules: match alerts to channels and recipients
  routing:
    - match:
        alert_type: "schema"
        table_pattern: "payments.*"
      channel: slack
      slack_channel: "#finance-data"
    - match:
        alert_type: "freshness"
      channel: slack
      slack_channel: "#data-freshness"

  slack:
    webhook_url: ${SLACK_WEBHOOK_URL}
    channel: ${SLACK_CHANNEL:-#data-alerts}
    username: ObservaKit
    icon_emoji: ":mag:"
  email:
    smtp_host: ${SMTP_HOST:-smtp.gmail.com}
    smtp_port: ${SMTP_PORT:-587}
    from: ${ALERT_EMAIL_FROM}
    to: ${ALERT_EMAIL_TO}

# ---- Lineage ----
lineage:
  - table: public.orders
    downstream:
      - public.order_items
      - reporting.daily_revenue
  - table: public.customers
    downstream:
      - reporting.customer_activity

# ---- Cross-Table Consistency Checks ----
consistency:
  # Verifies every order_item links to a valid order (referential integrity)
  - name: "Orders ↔ Order Items referential integrity"
    check: row_count_match
    table_a: public.order_items
    table_b: public.orders
    join_key: order_id
    tolerance: 0           # zero orphans allowed
    alert: slack

  # Verifies revenue totals match accounting ledger within 1%
  # - name: "Revenue reconciliation"
  #   check: sum_match
  #   table_a: public.orders
  #   column_a: amount
  #   table_b: accounting.ledger
  #   column_b: credit_amount
  #   tolerance_pct: 0.01  # within 1%
  #   alert: slack

# ---- dbt Integration ----
dbt:
  enabled: false               # set to true to enable dbt artifact parsing
  project_dir: /path/to/dbt/project
  profiles_dir: /path/to/.dbt
  auto_parse_on_run: true      # poll for new run_results.json every 5 minutes
  poll_interval_minutes: 5
  expose_model_freshness: true # use dbt source freshness as ObservaKit freshness
